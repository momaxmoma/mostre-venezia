<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mostre Venezia</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    /* Popup */

    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 18px;
      line-height: 1.5;
    }

    .popup-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .popup-line {
      margin-bottom: 8px;
    }

    /* Pulsante visitata */

    .visit-btn {
      margin-top: 12px;
      padding: 10px 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    /* Legenda */

    .legend {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      font-size: 15px;
      line-height: 1.7;
    }

    .legend-color {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* Filtro */

    .filter-box {
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      font-size: 16px;
    }

  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // =========================
  // MAPPA
  // =========================

  const map = L.map('map').setView([45.44, 12.33], 13);

  map.tap = true;

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution: '&copy; OpenStreetMap'
    }
  ).addTo(map);


  // =========================
  // VARIABILI GLOBALI
  // =========================

  const today = new Date();

  let allData = [];
  let allMarkers = [];

  let onlyOpen = false;


  // =========================
  // GESTIONE STATO VISITATA
  // =========================

  function getVisitedState(nome, defaultValue) {

    const value = localStorage.getItem(nome);

    if (value === "visited") {
      return true;
    }

    if (value === "unvisited") {
      return false;
    }

    return defaultValue;
  }


  // =========================
  // TOGGLE VISITATA
  // =========================

  window.toggleVisited = function(nome) {

    const mostra = allData.find(
      m => m.nome === nome
    );

    const current =
      getVisitedState(
        nome,
        mostra.visitata === true
      );

    if (current) {

      localStorage.setItem(
        nome,
        "unvisited"
      );

    } else {

      localStorage.setItem(
        nome,
        "visited"
      );

    }

    renderMarkers();
  }


  // =========================
  // MOSTRA APERTA?
  // =========================

  function isOpen(start, end) {
    return today >= start &&
           today <= end;
  }


  // =========================
  // COLORE MARKER
  // =========================

  function getColor(
    visited,
    start,
    end
  ) {

    if (visited) {
      return "blue";
    }

    const diffDays =
      (end - today) /
      (1000 * 60 * 60 * 24);

    if (today > end) {
      return "red";
    }

    if (today < start) {
      return "yellow";
    }

    if (diffDays < 10) {
      return "orange";
    }

    return "green";
  }


  // =========================
  // RENDER MARKER
  // =========================

  function renderMarkers() {

    // Rimuove marker vecchi
    allMarkers.forEach(marker => {
      map.removeLayer(marker);
    });

    allMarkers = [];

    allData.forEach(m => {

      const start =
        new Date(m.data_inizio);

      const end =
        new Date(m.data_fine);

      // Stato visitata finale
      const visited =
        getVisitedState(
          m.nome,
          m.visitata === true
        );

      // Filtro solo aperte
      if (
        onlyOpen &&
        !isOpen(start, end)
      ) {
        return;
      }

      const color =
        getColor(
          visited,
          start,
          end
        );

      // =========================
      // MARKER
      // =========================

      const marker =
        L.circleMarker(
          [m.lat, m.lon],
          {
            radius: 16,
            weight: 3,

            color: color,
            fillColor: color,
            fillOpacity: 0.85
          }
        ).addTo(map);


      // =========================
      // POPUP
      // =========================

      marker.bindPopup(`

        <div style="min-width:250px;">

          <div class="popup-title">
            ${m.nome}
          </div>

          <div class="popup-line">
            📍 ${m.indirizzo}
          </div>

          <div class="popup-line">
            📅 ${m.data_inizio}
            →
            ${m.data_fine}
          </div>

          <div class="popup-line">
            ${visited
              ? '✅ Visitata'
              : '🆕 Non visitata'}
          </div>

          <button
            class="visit-btn"
            onclick="toggleVisited('${m.nome.replace(/'/g, "\\'")}')"
          >
            ${visited
              ? 'Rimuovi visitata'
              : 'Segna visitata'}
          </button>

        </div>

      `, {
        maxWidth: 320
      });

      allMarkers.push(marker);

    });

  }


  // =========================
  // CARICA JSON
  // =========================

  fetch(
    'mostre.json?v=' +
    new Date().getTime()
  )

    .then(res => res.json())

    .then(data => {

      allData = data;

      renderMarkers();

    });


  // =========================
  // LEGENDA
  // =========================

  const legend =
    L.control({
      position: 'bottomright'
    });

  legend.onAdd = function () {

    const div =
      L.DomUtil.create(
        'div',
        'legend'
      );

    div.innerHTML = `

      <div>
        <span class="legend-color"
          style="background:green"></span>
        Aperta
      </div>

      <div>
        <span class="legend-color"
          style="background:orange"></span>
        In chiusura (&lt;10 gg)
      </div>

      <div>
        <span class="legend-color"
          style="background:yellow"></span>
        Futura
      </div>

      <div>
        <span class="legend-color"
          style="background:red"></span>
        Chiusa
      </div>

      <div>
        <span class="legend-color"
          style="background:blue"></span>
        Visitata
      </div>

    `;

    return div;
  };

  legend.addTo(map);


  // =========================
  // FILTRO SOLO APERTE
  // =========================

  const filterControl =
    L.control({
      position: 'topright'
    });

  filterControl.onAdd = function () {

    const div =
      L.DomUtil.create(
        'div',
        'filter-box'
      );

    div.innerHTML = `

      <label>
        <input
          type="checkbox"
          id="openFilter"
        >
        Solo aperte
      </label>

    `;

    return div;
  };

  filterControl.addTo(map);


  // Blocca eventi mappa
  const filterBox =
    document.querySelector(
      '.filter-box'
    );

  L.DomEvent.disableClickPropagation(
    filterBox
  );

  L.DomEvent.disableScrollPropagation(
    filterBox
  );


  // Evento checkbox
  document.addEventListener(
    'change',
    function(e) {

      if (
        e.target &&
        e.target.id === 'openFilter'
      ) {

        onlyOpen =
          e.target.checked;

        renderMarkers();

      }

    }
  );

</script>

</body>
</html>
