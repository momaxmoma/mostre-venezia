<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />

  <!-- IMPORTANTISSIMO per mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mostre Venezia</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    /* Popup mobile-friendly */
    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 18px;
      line-height: 1.5;
    }

    .popup-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .popup-line {
      margin-bottom: 8px;
    }

    /* Legenda */
    .legend {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      font-size: 16px;
      line-height: 1.7;
    }

    .legend-color {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // =========================
  // MAPPA
  // =========================

  const map = L.map('map').setView([45.44, 12.33], 13);

  // Migliora touch mobile
  map.tap = true;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);


  // =========================
  // DATA ODIERNA
  // =========================

  const today = new Date();


  // =========================
  // COLORI
  // =========================

  function getColor(mostra, start, end) {

    // Visitata
    if (mostra.visitata) {
      return "blue";
    }

    // Giorni mancanti alla chiusura
    const diffDays = (end - today) / (1000 * 60 * 60 * 24);

    // Chiusa
    if (today > end) {
      return "red";
    }

    // Futura
    if (today < start) {
      return "yellow";
    }

    // In chiusura
    if (diffDays < 10) {
      return "orange";
    }

    // Aperta
    return "green";
  }


  // =========================
  // CARICAMENTO JSON
  // Anti-cache con timestamp
  // =========================

  fetch('mostre.json?v=' + new Date().getTime())

    .then(res => res.json())

    .then(data => {

      data.forEach(m => {

        const start = new Date(m.data_inizio);
        const end = new Date(m.data_fine);

        const color = getColor(m, start, end);

        // =========================
        // MARKER GRANDI MOBILE
        // =========================

        const marker = L.circleMarker([m.lat, m.lon], {

          radius: 10,
          weight: 3,

          color: color,
          fillColor: color,
          fillOpacity: 0.85

        }).addTo(map);


        // =========================
        // POPUP GRANDE
        // =========================

        marker.bindPopup(`

          <div style="min-width:250px;">

            <div class="popup-title">
              ${m.nome}
            </div>

            <div class="popup-line">
              📍 ${m.indirizzo}
            </div>

            <div class="popup-line">
              📅 ${m.data_inizio} → ${m.data_fine}
            </div>

            <div class="popup-line">
              ${m.visitata ? '✅ Visitata' : '🆕 Non visitata'}
            </div>

          </div>

        `, {

          maxWidth: 320

        });

      });

    });


  // =========================
  // LEGENDA
  // =========================

  const legend = L.control({ position: 'bottomright' });

  legend.onAdd = function () {

    const div = L.DomUtil.create('div', 'legend');

    div.innerHTML = `

      <div><span class="legend-color" style="background:green"></span> Aperta</div>

      <div><span class="legend-color" style="background:orange"></span> In chiusura (&lt;10 gg)</div>

      <div><span class="legend-color" style="background:yellow"></span> Futura</div>

      <div><span class="legend-color" style="background:red"></span> Chiusa</div>

      <div><span class="legend-color" style="background:blue"></span> Visitata</div>

    `;

    return div;
  };

  legend.addTo(map);

</script>

</body>
</html>
